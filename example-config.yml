loglevel: # default: info; options: trace | debug | info | warn | error
write-directory: # default: evaluation_results
write: # default: true; false will disable writing the output to file
output: # default: yaml; options: yaml | json | sarif
services:
  # if there are multiple entries here, multiple of the same or different plugins can be run via Privateer
  # while running via debug, only one service can be run at a time, and must be specified using --service=<service_name>
  #
  # Replace the example service name below with your service id/name. Multiple services
  # may be provided at the same level as separate map entries.
  myService1: # unique name/id for the evaluation
    plugin: pvtr-azure-blob-storage # required while running via Privateer

    # The policy section may be set at the top level if assessing multiple services via privateer
    policy:
      catalogs: ["CCC.ObjStor"] # this is the first catalog the plugin is built for, but more may be developed later
      applicability:
        - tlp-amber
        - tlp-red
        - tlp-clear
        - tlp-green
    vars:
      storageaccountresourceid: /subscriptions/<subscription-id>/resourceGroups/<resource-group>/providers/Microsoft.Storage/storageAccounts/<account-name>
      # Optional: Authentication configuration
      # The plugin tries these in order: token > service principal > DefaultAzureCredential
      #
      # Option 1: Bearer token (short-lived, ~1 hour, for one-off runs)
      # Generate via: az account get-access-token --resource https://management.azure.com --query accessToken -o tsv
      # token: <bearer-token>
      #
      # Option 2: Service Principal (long-lived, for CI/automation)
      # clientid: <application-client-id>        # Azure AD App Registration Application (client) ID
      # clientsecret: <client-secret-value>      # Azure AD App Registration client secret value
      # tenantid: <azure-ad-tenant-id>           # Azure AD tenant (directory) ID
      #
      # Option 3: DefaultAzureCredential (no config needed)
      # Uses az login, managed identity, or AZURE_* environment variables automatically
