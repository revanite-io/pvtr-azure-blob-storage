---
name: "Auto Labeler"
on:
  # pull_request_target event is required for autolabeler to support all PRs including forks
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

permissions: {}

jobs:
  auto_labeler:
    permissions:
      contents: read # Required by reusable workflow
      pull-requests: write # Apply labels to PRs
    uses: github-community-projects/ospo-reusable-workflows/.github/workflows/auto-labeler.yaml@a0cf79bd8756e0a9c1555bf4975eae7ce7a8e8dc
    with:
      config-name: release-drafter.yml
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
